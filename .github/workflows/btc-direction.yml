name: BTC Direction Bot (1H)

on:
  schedule:
    - cron: '2 * * * *'   # 2 minutos después de cada hora (cuando la vela ya cerró)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-btc-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Correr bot dirección BTC
        run: python btc_direction_bot.py

      - name: Guardar log en repositorio
        run: |
          git config --global user.email "btc-bot@github"
          git config --global user.name "BTC Direction Bot"

          # Capturar SOLO la línea nueva que este ciclo agregó, antes de
          # tocar nada de git. Con varios workflows compitiendo por el mismo
          # repo, un simple "rebase + reintento" puede toparse con un
          # CONFLICT (content) real en vez de solo un push rechazado — eso
          # NO se resuelve reintentando el mismo rebase. En cada intento se
          # parte de la base más reciente y se reaplica esta línea limpia
          # encima, así nunca hay que reconciliar dos versiones divergentes.
          NEW_CONTENT=$(git diff -- btc_bot_log.jsonl | grep '^+' | grep -v '^+++' | sed 's/^+//')

          if [ -z "$NEW_CONTENT" ]; then
            echo "Sin cambios en el log, nada que commitear."
            exit 0
          fi

          pushed=0
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git reset --hard origin/main
            printf '%s\n' "$NEW_CONTENT" >> btc_bot_log.jsonl
            git add btc_bot_log.jsonl
            git commit -m "BTC cycle $(date '+%Y-%m-%d %H:%M UTC')"
            if git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "Push rechazado (intento $i), reintentando..."
            sleep $((RANDOM % 5 + 1))
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::No se pudo pushear btc_bot_log.jsonl tras 8 intentos"
            exit 1
          fi
