name: Polymarket Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ver archivos disponibles
        run: ls -la

      - name: Correr bot (1 ciclo)
        run: python polymarket_bot.py --ciclos 1

      - name: Guardar log en el repositorio
        run: |
          git config --global user.email "polymarket-bot@github"
          git config --global user.name "Polymarket Bot"
          git add bot_log.jsonl || true
          if git diff --cached --quiet; then
            echo "Sin cambios en el log, nada que commitear."
            exit 0
          fi
          git commit -m "Bot cycle $(date '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break
            echo "Push rechazado (intento $i), reintentando..."
            git rebase --abort || true
            sleep $((RANDOM % 5 + 1))
          done
